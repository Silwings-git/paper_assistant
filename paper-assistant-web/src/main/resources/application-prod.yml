spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    com.paperassistant: INFO

server:
  port: ${SERVER_PORT:8080}

app:
  async:
    retrieval:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 10
    analysis:
      core-pool-size: 5
      max-pool-size: 10
      queue-capacity: 20

llm:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY}
    default-model: qwen-plus

paper:
  fulltext:
    extractor-order:
      - latex
      - vision
      - ar5iv
      - pdfbox
      - abstract

scheduler:
  jobs:
    task-status-cleanup:
      cron: "0 0 2 * * ?"
      enabled: true

# SpringDoc OpenAPI 配置 (prod 环境关闭)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
