spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/paper_assistant
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: redis
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.paperassistant: DEBUG
    com.paperassistant.mapper: DEBUG

server:
  port: 8080
  compression:
    enabled: false

app:
  async:
    retrieval:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 10
    analysis:
      core-pool-size: 5
      max-pool-size: 10
      queue-capacity: 20

llm:
  dashscope:
    api-key: ${PAPER_ASSISTANT_LLM_KEY:}
    default-model: qwen3.6-plus

paper:
  fulltext:
    extractor-order:
      - latex
      - vision
      - ar5iv
      - pdfbox
      - abstract

scheduler:
  jobs:
    task-status-cleanup:
      cron: "0 0 2 * * ?"
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.paperassistant
